spring:
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1?oracle.jdbc.timezoneAsRegion=false
    username: taskforge
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC