<app-navbar />

<div class="project-list-container">

  <app-loading
    *ngIf="isLoading"
    message="Loading Projects...">
  </app-loading>

  <div *ngIf="!isLoading">

    <div class="page-header">
      <div class="header-text">
        <h1>Projects</h1>
        <p>Manage and organize your projects</p>
      </div>
      <button mat-raised-button color="primary" routerLink="/projects/new">
        <mat-icon>add</mat-icon>
        New Project
      </button>
    </div>

    <app-empty-state
      *ngIf="!isLoading && projects.length === 0"
      icon="folder_open"
      title="No Projects Yet"
      message="Create your first project to start organizing your tasks."
      actionLabel="Create your first project"
      actionIcon="add"
      actionRoute="/projects/new">
    </app-empty-state>

    <div class="projects-grid" *ngIf="!isLoading && projects.length > 0">
      <mat-card class="project-card"
                *ngFor="let project of projects"
                (click)="navigateToBoard(project.id)">

        <mat-card-header>
          <mat-icon mat-card-avatar class="project-icon">folder</mat-icon>
          <mat-card-title>{{ project.name }}</mat-card-title>
          <mat-card-subtitle>
            <mat-icon class="inline-icon">task_alt</mat-icon>
            {{ project.taskCount }} tasks
          </mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
          <p class="project-description">
            {{ project.description || 'No description provided' }}
          </p>
          <p class="project-meta">
            <mat-icon class="inline-icon">person</mat-icon>
            {{ project.ownerName }}
            <span class="separator">•</span>
            <mat-icon class="inline-icon">calendar_today</mat-icon>
            {{ project.createdAt | date:'mediumDate' }}
          </p>
        </mat-card-content>

        <mat-card-actions align="end">
          <button mat-button color="primary"
                  (click)="navigateToBoard(project.id); $event.stopPropagation()">
            <mat-icon>dashboard</mat-icon>
            Open Board
          </button>
          <button mat-icon-button color="warn"
                  matTooltip="Delete project"
                  (click)="deleteProject(project, $event)">
            <mat-icon>delete</mat-icon>
          </button>
        </mat-card-actions>

      </mat-card>
    </div>

  </div>
</div>
