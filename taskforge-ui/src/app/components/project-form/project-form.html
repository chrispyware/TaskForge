<app-navbar />

<div class="project-form-container">
  <mat-card class="project-form-card">

    <mat-card-header>
      <mat-icon mat-card-avatar color="primary">folder_open</mat-icon>
      <mat-card-title>Create New Project</mat-card-title>
      <mat-card-subtitle>Set up a new project to organize your tasks</mat-card-subtitle>
    </mat-card-header>

    <app-loading
      *ngIf="isLoading"
      message="Loading Project...">
    </app-loading>

    <mat-card-content>
      <form [formGroup]="projectForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Project Name</mat-label>
          <input matInput formControlName="name"
                 placeholder="Enter a name for your project">
          <mat-error *ngIf="projectForm.get('name')?.hasError('required')">
            Project name is required
          </mat-error>
          <mat-error *ngIf="projectForm.get('name')?.hasError('minlength')">
            Project name must be at least 2 characters
          </mat-error>
          <mat-error *ngIf="projectForm.get('name')?.hasError('maxlength')">
            Project name cannot exceed 200 characters
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description"
                    placeholder="Describe what this project is about"
                    rows="4">
          </textarea>
          <mat-hint>Optional — give your team context about this project</mat-hint>
        </mat-form-field>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <div class="form-actions">
          <button mat-button type="button" (click)="onCancel()">
            Cancel
          </button>
          <button mat-raised-button color="primary" type="submit"
                  [disabled]="projectForm.invalid || isLoading">
            <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
            <mat-icon *ngIf="!isLoading">add</mat-icon>
            <span *ngIf="!isLoading">Create Project</span>
          </button>
        </div>

      </form>
    </mat-card-content>

  </mat-card>
</div>
