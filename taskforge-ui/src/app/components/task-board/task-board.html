<app-navbar />

<div class="board-container">

  <div class="loading-spinner" *ngIf="isLoading">
    <mat-spinner></mat-spinner>
  </div>

  <div *ngIf="!isLoading">

    <div class="page-header board-header">
      <div class="board-title">
        <button mat-icon-button routerLink="/projects" matTooltip="Back to projects">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <div>
          <h1>{{ project?.name }}</h1>
          <p>{{ project?.description }}</p>
        </div>
      </div>
      <button mat-raised-button color="primary" (click)="createTask()">
        <mat-icon>add</mat-icon>
        Add Task
      </button>
    </div>

    <div class="board-columns" cdkDropListGroup>
      <div class="board-column"
           *ngFor="let column of columns"
           [style.background-color]="column.color">

        <div class="column-header">
          <h3>{{ column.title }}</h3>
          <span class="task-count">{{ column.tasks.length }}</span>
        </div>

        <div class="task-list"
             cdkDropList
             [cdkDropListData]="column.tasks"
             [id]="column.id"
             (cdkDropListDropped)="onTaskDrop($event, column.status)">

          <div class="empty-column" *ngIf="column.tasks.length === 0">
            <mat-icon>inbox</mat-icon>
            <p>No tasks</p>
          </div>

          <mat-card class="task-card"
                    *ngFor="let task of column.tasks"
                    cdkDrag
                    (click)="navigateToTask(task.id)">

            <div class="drag-handle" cdkDragHandle>
              <mat-icon>drag_indicator</mat-icon>
            </div>

            <mat-card-content>
              <div class="task-header">
                <span class="task-title">{{ task.title }}</span>
                <span class="priority-badge" [class]="getPriorityColor(task.priority)">
                  {{ task.priority }}
                </span>
              </div>

              <p class="task-description" *ngIf="task.description">
                {{ task.description }}
              </p>

              <div class="task-footer">
                <div class="task-assignee" *ngIf="task.assigneeName">
                  <mat-icon>person</mat-icon>
                  <span>{{ task.assigneeName }}</span>
                </div>
                <div class="task-due-date" *ngIf="task.dueDate">
                  <mat-icon>calendar_today</mat-icon>
                  <span>{{ task.dueDate | date:'shortDate' }}</span>
                </div>
              </div>
            </mat-card-content>

          </mat-card>

        </div>
      </div>
    </div>

  </div>
</div>
