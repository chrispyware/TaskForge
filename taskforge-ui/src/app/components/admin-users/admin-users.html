<app-navbar />

<div class="admin-container">

  <div class="page-header">
    <div class="header-text">
      <h1>User Management</h1>
      <p>{{ users.length }} registered users</p>
    </div>
  </div>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search users</mat-label>
    <input matInput [(ngModel)]="searchQuery" (ngModelChange)="onSearchChange()"
           placeholder="Search by name or email">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <app-loading
    *ngIf="isLoading"
    message="Loading Users...">
  </app-loading>

  <mat-card *ngIf="!isLoading">
    <table mat-table [dataSource]="filteredUsers" class="users-table">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let user">{{ user.id }}</td>
      </ng-container>

      <ng-container matColumnDef="displayName">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let user">
          <div class="user-cell">
            <div class="avatar">{{ user.displayName.charAt(0) }}</div>
            {{ user.displayName }}
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let user">
          <span class="role-badge" [class.admin]="user.role === 'ADMIN'">
            {{ user.role }}
          </span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <app-empty-state
      *ngIf="!isLoading && filteredUsers.length === 0"
      icon="group_off"
      title="No Users Found"
      message="No users match your current search. Try adjusting the search term.">
    </app-empty-state>
  </mat-card>

</div>
